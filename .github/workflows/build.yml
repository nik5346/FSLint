name: Build and Package CLI

# This workflow can be toggled to use self-hosted runners by setting the following
# Repository Variables in GitHub Settings -> Secrets and variables -> Actions -> Variables:
# - LINT_RUNNER:    Set to 'self-hosted' to run lint on any available runner, or a specific label
# - LINUX_RUNNER:   Set to 'self-hosted' (or your specific label) to override ubuntu-latest
# - WINDOWS_RUNNER: Set to 'self-hosted' (or your specific label) to override windows-latest
# - MACOS_RUNNER:   Set to 'self-hosted' (or your specific label) to override macos-latest

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Encoding Check
    runs-on: ${{ vars.LINT_RUNNER || 'ubuntu-latest' }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Check Encodings
      run: python3 scripts/check_encodings.py

  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          jq -n \
            --arg win_runner "${{ vars.WINDOWS_RUNNER || 'windows-latest' }}" \
            --arg linux_runner "${{ vars.LINUX_RUNNER || 'ubuntu-latest' }}" \
            --arg macos_runner "${{ vars.MACOS_RUNNER || 'macos-latest' }}" \
            --arg build_linux "${{ vars.BUILD_LINUX || 'false' }}" \
            --arg build_macos "${{ vars.BUILD_MACOS || 'false' }}" \
            '
            {
              include: [
                { os: "windows-latest", runner: $win_runner },
                (if $build_linux == "true" then { os: "ubuntu-latest", runner: $linux_runner } else empty end),
                (if $build_macos == "true" then { os: "macos-latest", runner: $macos_runner } else empty end)
              ]
            }
            ' > matrix.json
          echo "matrix=$(cat matrix.json | jq -c .)" >> $GITHUB_OUTPUT

  build:
    needs: [setup]
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --target FSLint-cli

    - name: Prepare Artifact (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p dist
        cp build/FSLint-cli dist/
        cp -r standard dist/
        # Copy libxml2 shared library (including symlinks)
        find build/_deps/libxml2-build -name "libxml2.so*" -exec cp -P {} dist/ \;

    - name: Prepare Artifact (macOS)
      if: runner.os == 'macOS'
      run: |
        mkdir -p dist
        cp build/FSLint-cli dist/
        cp -r standard dist/
        # Copy libxml2 shared library (including symlinks)
        find build/_deps/libxml2-build -name "libxml2*.dylib" -exec cp -P {} dist/ \;

    - name: Prepare Artifact (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist
        Copy-Item -Path "build/Release/FSLint-cli.exe" -Destination "dist/"
        Copy-Item -Path "standard" -Destination "dist/" -Recurse
        if (Test-Path "build/Release/*.dll") {
            Copy-Item -Path "build/Release/*.dll" -Destination "dist/"
        }
        if (Test-Path "build/_deps/libxml2-build") {
            Get-ChildItem -Path "build/_deps/libxml2-build" -Filter "*.dll" -Recurse | ForEach-Object {
                Copy-Item -Path $_.FullName -Destination "dist/" -ErrorAction SilentlyContinue
            }
        }

    - name: Test with Bouncing Ball FMU (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        curl -L -o Reference-FMUs.zip https://github.com/modelica/Reference-FMUs/releases/download/v0.0.39/Reference-FMUs-0.0.39.zip
        python3 -c "import zipfile; zipfile.ZipFile('Reference-FMUs.zip').extract('2.0/BouncingBall.fmu', 'test_fmu')"
        mv test_fmu/2.0/BouncingBall.fmu .
        ./dist/FSLint-cli BouncingBall.fmu

    - name: Test with Bouncing Ball FMU (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri https://github.com/modelica/Reference-FMUs/releases/download/v0.0.39/Reference-FMUs-0.0.39.zip -OutFile Reference-FMUs.zip
        python -c "import zipfile; zipfile.ZipFile('Reference-FMUs.zip').extract('2.0/BouncingBall.fmu', 'test_fmu')"
        Move-Item -Path test_fmu/2.0/BouncingBall.fmu -Destination .
        ./dist/FSLint-cli.exe BouncingBall.fmu

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FSLint-cli-${{ matrix.os }}
        path: dist/

name: Build and Package CLI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    name: Formatting and Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Ninja and Doxygen
        run: |
          python -m pip install ninja
          sudo apt-get update
          sudo apt-get install -y doxygen
      - name: Check Encodings
        run: python scripts/check_encodings.py
      - name: Configure CMake
        run: cmake -G Ninja -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCLANG_TIDY_AS_ERRORS=ON
      - name: XML Format Check
        run: cmake --build build --target format-xml-check
      - name: Clang-Format Check
        run: cmake --build build --target clang-format-check
      - name: Doxygen Check
        run: cmake --build build --target doxygen-check
      - name: Clang-Tidy
        run: cmake --build build --target clang-tidy
      - name: Rust Format Check
        run: cargo fmt --all -- --check
      - name: Rust Clippy
        run: cargo clippy -- -D warnings

  lint-web:
    name: Web App Linting and Formatting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format Check
        run: npm run format:check

  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    needs: lint
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            short_os: windows
            arch: x64
            runner: windows-latest
            cmake_args: "-A x64"
            rust_target: "x86_64-pc-windows-msvc"
          - os: windows-latest
            short_os: windows
            arch: arm64
            runner: windows-11-arm
            cmake_args: "-A ARM64"
            rust_target: "aarch64-pc-windows-msvc"
          - os: ubuntu-latest
            short_os: linux
            arch: x64
            runner: ubuntu-latest
            cmake_args: ""
            rust_target: "x86_64-unknown-linux-gnu"
          - os: ubuntu-latest
            short_os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            cmake_args: ""
            rust_target: "aarch64-unknown-linux-gnu"
          - os: macos-latest
            short_os: darwin
            arch: x64
            runner: macos-latest
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            rust_target: "x86_64-apple-darwin"
          - os: macos-latest
            short_os: darwin
            arch: arm64
            runner: macos-latest
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=arm64"
            rust_target: "aarch64-apple-darwin"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Download Reference FMUs
        run: python scripts/download_reference_fmus.py

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --target FSLint-cli FSLint-tests

      - name: Build Rust CLI
        run: cargo build --release --target ${{ matrix.rust_target }} --bin fslint-cli

      - name: Run C++ Tests
        shell: bash
        run: |
          cd build
          ctest --output-on-failure -C Release

      - name: Run Rust Tests
        run: cargo test --release --target ${{ matrix.rust_target }}

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp build/Release/FSLint-cli.exe dist/
            cp target/${{ matrix.rust_target }}/release/fslint-cli.exe dist/fslint-rust-cli.exe
          else
            cp build/FSLint-cli dist/
            cp target/${{ matrix.rust_target }}/release/fslint-cli dist/fslint-rust-cli
          fi
          cp LICENSE dist/
          cp -r standard dist/

      - name: Test with Bouncing Ball FMUs
        shell: bash
        if: (matrix.arch == 'x64' && runner.arch == 'X64') || (matrix.arch == 'arm64' && runner.arch == 'ARM64') || runner.os == 'macOS'
        run: |
          CLI_BIN="./dist/FSLint-cli"
          if [ "${{ runner.os }}" == "Windows" ]; then
            CLI_BIN="./dist/FSLint-cli.exe"
          fi
          $CLI_BIN tests/reference_fmus/1.0/cs/BouncingBall.fmu > fslint_cli_10cs.log 2>&1
          $CLI_BIN tests/reference_fmus/1.0/me/BouncingBall.fmu > fslint_cli_10me.log 2>&1
          $CLI_BIN tests/reference_fmus/2.0/BouncingBall.fmu > fslint_cli_20.log 2>&1
          $CLI_BIN tests/reference_fmus/3.0/BouncingBall.fmu > fslint_cli_30.log 2>&1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FSLint-cli-${{ matrix.short_os }}-${{ matrix.arch }}
          path: dist/

  build-wasm:
    name: Build WASM
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "latest"

      - name: Configure CMake
        run: emcmake cmake -B build-wasm -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: emmake cmake --build build-wasm --config Release --target FSLint-cli

      - name: Prepare WASM Artifacts
        run: |
          mkdir -p dist-wasm
          cp build-wasm/FSLint-cli.js dist-wasm/FSLint-cli-wasm.js
          cp build-wasm/FSLint-cli.wasm dist-wasm/FSLint-cli-wasm.wasm
          cp LICENSE dist-wasm/

      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FSLint-wasm-core
          path: dist-wasm/

  build-wasm-rust:
    name: Build Rust WASM
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build Rust WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Prepare Rust WASM Artifacts
        run: |
          mkdir -p dist-wasm-rust
          cp target/wasm32-unknown-unknown/release/libfslint.wasm dist-wasm-rust/fslint-rust.wasm
          cp LICENSE dist-wasm-rust/

      - name: Upload Rust WASM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FSLint-rust-wasm
          path: dist-wasm-rust/

  build-web:
    name: Build Web App
    needs: [build-wasm, lint-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM Artifacts
        uses: actions/download-artifact@v4
        with:
          name: FSLint-wasm-core
          path: web/public/

      - name: Copy Assets
        run: |
          cp images/icon.svg web/public/
          cp images/banner.svg web/public/
          cp RULES.md web/public/rules.md

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Web App
        run: |
          cd web
          npm install
          npm run build

      - name: Prepare Artifact
        run: |
          mkdir -p dist
          cp -r web/dist/* dist/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FSLint-web-app
          path: dist/

  deploy-web:
    name: Deploy Web App
    needs: build-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web App
        uses: actions/download-artifact@v4
        with:
          name: FSLint-web-app
          path: "./web-dist"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./web-dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

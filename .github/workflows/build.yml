name: Build and Package CLI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Encoding Check
    runs-on: ${{ vars.LINT_RUNNER || 'ubuntu-latest' }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Check Encodings
      run: python scripts/check_encodings.py

  clang-format:
    name: Clang-Format Check
    runs-on: ${{ vars.LINT_RUNNER || 'ubuntu-latest' }}
    steps:
    - uses: actions/checkout@v4

    - name: Run clang-format
      shell: pwsh
      run: |
        $files = Get-ChildItem -Recurse -Include *.cpp,*.c,*.h,*.hpp |
          Where-Object { $_.FullName -notmatch '\\build\\' -and $_.FullName -notmatch '\\.git\\' }
        $failed = $false
        foreach ($file in $files) {
          & clang-format --dry-run --Werror $file.FullName
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error file=$($file.FullName)::clang-format violation"
            $failed = $true
          }
        }
        if ($failed) { exit 1 }

  clang-tidy:
    name: Clang-Tidy Check
    runs-on: ${{ vars.LINT_RUNNER || 'ubuntu-latest' }}
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake (generate compile_commands.json)
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run clang-tidy
      shell: pwsh
      run: |
        $files = Get-ChildItem -Recurse -Include *.cpp,*.c |
          Where-Object { $_.FullName -notmatch '\\build\\' -and $_.FullName -notmatch '\\.git\\' }
        $failed = $false
        foreach ($file in $files) {
          & clang-tidy -p build --warnings-as-errors='*' $file.FullName
          if ($LASTEXITCODE -ne 0) { $failed = $true }
        }
        if ($failed) { exit 1 }

  setup:
    name: Setup Build Matrix
    runs-on: ${{ vars.LINT_RUNNER || 'ubuntu-latest' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - id: set-matrix
        env:
          WIN_RUNNER: ${{ vars.WINDOWS_RUNNER || 'windows-latest' }}
          LINUX_RUNNER: ${{ vars.LINUX_RUNNER || 'ubuntu-latest' }}
          MACOS_RUNNER: ${{ vars.MACOS_RUNNER || 'macos-latest' }}
          BUILD_LINUX: ${{ vars.BUILD_LINUX || 'false' }}
          BUILD_MACOS: ${{ vars.BUILD_MACOS || 'false' }}
        shell: python
        run: |
          import json
          import os

          win_runner = os.environ.get('WIN_RUNNER', 'windows-latest')
          linux_runner = os.environ.get('LINUX_RUNNER', 'ubuntu-latest')
          macos_runner = os.environ.get('MACOS_RUNNER', 'macos-latest')
          build_linux = os.environ.get('BUILD_LINUX', 'false').lower() == 'true'
          build_macos = os.environ.get('BUILD_MACOS', 'false').lower() == 'true'

          include = [{"os": "windows-latest", "runner": win_runner}]
          if build_linux:
              include.append({"os": "ubuntu-latest", "runner": linux_runner})
          if build_macos:
              include.append({"os": "macos-latest", "runner": macos_runner})

          matrix = {"include": include}
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")

  build:
    needs: [setup]
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --target FSLint-cli

    - name: Prepare Artifact (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p dist
        cp build/FSLint-cli dist/
        cp -r standard dist/
        # Copy libxml2 shared library (including symlinks)
        find build/_deps/libxml2-build -name "libxml2.so*" -exec cp -P {} dist/ \;

    - name: Prepare Artifact (macOS)
      if: runner.os == 'macOS'
      run: |
        mkdir -p dist
        cp build/FSLint-cli dist/
        cp -r standard dist/
        # Copy libxml2 shared library (including symlinks)
        find build/_deps/libxml2-build -name "libxml2*.dylib" -exec cp -P {} dist/ \;

    - name: Prepare Artifact (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist
        Copy-Item -Path "build/Release/FSLint-cli.exe" -Destination "dist/"
        Copy-Item -Path "standard" -Destination "dist/" -Recurse
        if (Test-Path "build/Release/*.dll") {
            Copy-Item -Path "build/Release/*.dll" -Destination "dist/"
        }
        if (Test-Path "build/_deps/libxml2-build") {
            Get-ChildItem -Path "build/_deps/libxml2-build" -Filter "*.dll" -Recurse | ForEach-Object {
                Copy-Item -Path $_.FullName -Destination "dist/" -ErrorAction SilentlyContinue
            }
        }

    - name: Download Reference FMUs (Unix)
      if: runner.os != 'Windows'
      run: curl -L -o Reference-FMUs.zip https://github.com/modelica/Reference-FMUs/releases/download/v0.0.39/Reference-FMUs-0.0.39.zip

    - name: Download Reference FMUs (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: Invoke-WebRequest -Uri https://github.com/modelica/Reference-FMUs/releases/download/v0.0.39/Reference-FMUs-0.0.39.zip -OutFile Reference-FMUs.zip

    - name: Extract Bouncing Ball FMU
      shell: python
      run: |
        import zipfile
        import os
        import shutil
        with zipfile.ZipFile('Reference-FMUs.zip') as z:
            z.extract('2.0/BouncingBall.fmu', 'test_fmu')
        if os.path.exists('BouncingBall.fmu'):
            os.remove('BouncingBall.fmu')
        shutil.move('test_fmu/2.0/BouncingBall.fmu', 'BouncingBall.fmu')

    - name: Test with Bouncing Ball FMU (Unix)
      if: runner.os != 'Windows'
      run: ./dist/FSLint-cli BouncingBall.fmu

    - name: Test with Bouncing Ball FMU (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: ./dist/FSLint-cli.exe BouncingBall.fmu

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FSLint-cli-${{ matrix.os }}
        path: dist/
